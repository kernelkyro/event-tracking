<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    cursor: none !important; /* FIX: cover all elements so no system cursor flashes */
  }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-dim: rgba(255,255,255,0.08);
    --gray-mid: rgba(255,255,255,0.45);
    --gray-bright: rgba(255,255,255,0.75);
  }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #fff;
    font-family: 'IM Fell English', serif;
    overflow: hidden;
  }

  body.birthday-active {
    overflow-y: auto;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor-dot {
    position: fixed;
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    /* FIX: start hidden, reveal on first mousemove */
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  #cursor-ring {
    position: fixed;
    width: 28px; height: 28px;
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
    /* FIX: start hidden, reveal on first mousemove */
    opacity: 0;
    transition: width 0.2s ease, height 0.2s ease, border-color 0.2s ease, opacity 0.3s ease;
  }

  .cursor-trail {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    pointer-events: none;
    z-index: 99997;
    transform: translate(-50%, -50%);
    animation: trailFade 0.6s linear forwards;
  }
  @keyframes trailFade {
    0%   { opacity: 0.65; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0;    transform: translate(-50%,-50%) scale(0.1); }
  }

  /* ── GRAIN OVERLAY ── */
  #grain {
    position: fixed; inset: 0; z-index: 9999;
    pointer-events: none;
    opacity: 0.055;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 180px 180px;
    animation: grainShift 0.12s steps(1) infinite;
  }
  @keyframes grainShift {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-3px, 2px); }
    50%  { transform: translate(2px,-2px); }
    75%  { transform: translate(-1px, 3px); }
    100% { transform: translate(3px,-1px); }
  }

  /* ── SCREENS ── */
  /*
    All screens use position:fixed while inactive.
    The birthday screen is special — it needs position:relative when active
    so the body can scroll. We handle this with a 2-step JS sequence to
    avoid the position-change killing the opacity transition.

    Step 1: JS adds .active (switches position:fixed → relative, opacity stays 0)
    Step 2: On next rAF, JS adds .fadein (triggers opacity 0 → 1 transition)

    This separates the layout reflow from the opacity animation so both work.
  */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    text-align: center;
    padding: 20px;
    /* NOTE: no transition here — each screen manages its own fade */
  }

  /* Screens 1 & 2: standard fade, position stays fixed */
  #screen-countdown,
  #screen-arrival {
    transition: opacity 1.2s ease;
  }
  #screen-countdown.active,
  #screen-arrival.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Screen 3: position switches on .active, opacity transitions on .fadein */
  #screen-birthday {
    justify-content: flex-start;
    padding: 40px 20px 60px;
    /* opacity:0 already set by .screen */
    transition: opacity 1.2s ease; /* transition is still declared… */
  }
  #screen-birthday.active {
    /* Step 1: switch layout — reflow happens here, opacity stays 0 */
    position: relative;
    inset: auto;
    min-height: 100vh;
    pointer-events: all;
    /* opacity intentionally NOT set here to avoid snap */
  }
  #screen-birthday.fadein {
    /* Step 2: triggered one rAF after .active — now opacity animates cleanly */
    opacity: 1;
  }

  /* ── SCANLINES ── */
  .screen::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* ════════════════════════════
     SCREEN 1 — COUNTDOWN
  ════════════════════════════ */
  #screen-countdown { background: #000; }

  .countdown-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 2.2vw, 15px);
    letter-spacing: 0.38em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative; z-index: 2;
    animation: labelFlicker 4s ease-in-out infinite;
  }
  @keyframes labelFlicker {
    0%,94%,96%,98%,100% { opacity: 0.35; }
    95%,97%,99%          { opacity: 0.05; }
  }

  .countdown-sentence {
    font-family: 'IM Fell English', serif;
    font-size: clamp(22px, 5.5vw, 58px);
    font-style: italic;
    color: rgba(255,255,255,0.88);
    line-height: 1.5;
    position: relative; z-index: 2;
    text-shadow: 0 0 40px rgba(255,255,255,0.12);
    animation: sentenceGlitch 6s ease-in-out infinite;
  }
  @keyframes sentenceGlitch {
    0%,92%,100% { transform: skewX(0deg); opacity: 0.88; clip-path: none; }
    93%  { transform: skewX(-2.5deg) translateX(4px);  opacity: 0.5; clip-path: inset(30% 0 40% 0); }
    94%  { transform: skewX(1.5deg) translateX(-3px);  opacity: 0.9; clip-path: inset(60% 0 10% 0); }
    95%  { transform: skewX(0deg); opacity: 0.88; clip-path: none; }
  }

  #glitch-number {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(38px, 9vw, 96px);
    font-style: normal; font-weight: 400;
    color: #fff;
    letter-spacing: -0.02em;
    padding: 0 12px;
    position: relative;
    animation: numGlitch 0.09s steps(1) infinite;
    text-shadow: 2px 0 rgba(255,255,255,0.4), -2px 0 rgba(255,255,255,0.2);
  }
  @keyframes numGlitch {
    0%   { clip-path: inset(0 0 0 0);    transform: translateX(0); }
    20%  { clip-path: inset(20% 0 30% 0); transform: translateX(-2px); }
    40%  { clip-path: inset(55% 0 5% 0);  transform: translateX(2px); }
    60%  { clip-path: inset(10% 0 60% 0); transform: translateX(-1px); }
    80%  { clip-path: inset(40% 0 20% 0); transform: translateX(1px); }
    100% { clip-path: inset(0 0 0 0);    transform: translateX(0); }
  }

  .countdown-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 2vw, 14px);
    letter-spacing: 0.35em;
    color: #fff;
    margin-top: 36px;
    text-transform: uppercase;
    position: relative; z-index: 2;
    text-shadow: 0 0 8px rgba(255,255,255,0.4), 0 0 18px rgba(255,255,255,0.2);
    animation: subBlink 2.5s ease-in-out infinite;
  }
  /* FIX: was 0.18/0.05 (invisible). Now 0.85/0.15. */
  @keyframes subBlink {
    0%,49%,100% { opacity: 0.85; }
    50%,99%     { opacity: 0.15; }
  }

  #screen-countdown::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
    pointer-events: none; z-index: 1;
  }

  /* ════════════════════════════
     SCREEN 2 — ARRIVAL
  ════════════════════════════ */
  #screen-arrival { background: #000; }

  .arrival-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(24px, 6vw, 64px);
    color: rgba(255,255,255,0.9);
    text-shadow: 0 0 60px rgba(255,255,255,0.15);
    margin-bottom: 60px;
    position: relative; z-index: 2;
    opacity: 0; transform: scale(0.94); filter: blur(12px);
    transition: opacity 1.4s ease 0.3s, transform 1.6s ease 0.3s, filter 1.4s ease 0.3s;
  }
  .arrival-text.visible { opacity: 1; transform: scale(1); filter: blur(0); }

  .reveal-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 2vw, 14px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.5);
    padding: 18px 44px;
    position: relative; z-index: 2;
    opacity: 0; transform: translateY(12px);
    transition:
      opacity 1s ease 1.8s, transform 1s ease 1.8s,
      background 0.3s ease, color 0.3s ease,
      border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .reveal-btn.visible { opacity: 1; transform: translateY(0); }
  .reveal-btn:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.9);
    box-shadow: 0 0 28px rgba(255,255,255,0.08);
    color: #fff;
  }
  .reveal-btn:active { background: rgba(255,255,255,0.14); }

  /* ════════════════════════════
     SCREEN 3 — BIRTHDAY
  ════════════════════════════ */
  #screen-birthday { background: #000; }

  .birthday-inner {
    max-width: 740px; width: 100%;
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center;
  }

  .bday-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(32px, 8vw, 80px);
    color: #fff;
    text-shadow: 0 0 60px rgba(255,255,255,0.18);
    margin-bottom: 14px;
    opacity: 0; filter: blur(20px);
    transition: opacity 1.2s ease, filter 1.4s ease;
  }
  .bday-title.show { opacity: 1; filter: blur(0); }

  .bday-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 1.8vw, 13px);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    transition: opacity 1s ease 0.4s;
  }
  .bday-date.show { opacity: 1; }

  .gif-row-top {
    display: flex; gap: 20px;
    margin-bottom: 18px;
    opacity: 0; transform: translateY(10px);
    transition: opacity 1s ease 0.8s, transform 1s ease 0.8s;
    flex-wrap: wrap; justify-content: center;
  }
  .gif-row-top.show { opacity: 1; transform: translateY(0); }

  .scuba-gif {
    width: clamp(70px, 12vw, 110px);
    height: auto; border-radius: 4px;
    animation: floatGif 3.6s ease-in-out infinite;
  }
  .scuba-gif:nth-child(2) { animation-delay: 0.6s; animation-duration: 4.1s; }
  .scuba-gif:nth-child(3) { animation-delay: 1.1s; animation-duration: 3.3s; }
  @keyframes floatGif {
    0%,100% { transform: translateY(0px) rotate(-1deg); }
    50%     { transform: translateY(-10px) rotate(1deg); }
  }

  .bday-lines { width: 100%; }

  .bday-line {
    font-family: 'IM Fell English', serif;
    font-size: clamp(18px, 2.2vw, 22px);
    line-height: 1.9;
    color: rgba(255,255,255,0.85);
    text-align: center;
    margin: 10px 0;
    opacity: 0; filter: blur(8px); transform: translateY(6px);
    transition: opacity 1.1s ease, filter 1.2s ease, transform 1.1s ease;
  }
  .bday-line.big    { font-size: clamp(24px, 3vw, 30px); font-weight: 400; color: #fff; }
  .bday-line.muted  { color: rgba(255,255,255,0.6); }
  .bday-line.spacer { margin-bottom: 20px; }
  .bday-line.show   { opacity: 1; filter: blur(0); transform: translateY(0); }
  .bday-line em     { font-style: italic; color: rgba(255,255,255,0.65); }
  .bday-line strong { font-weight: 400; color: #fff; font-size: 1.1em; }

  .gif-row-bottom {
    display: flex; gap: 16px;
    margin-top: 50px;
    opacity: 0;
    transition: opacity 1.2s ease;
    flex-wrap: wrap; justify-content: center;
  }
  .gif-row-bottom.show { opacity: 1; }

  .corner-cat {
    position: fixed; z-index: 10;
    pointer-events: none;
    opacity: 0; transition: opacity 1.5s ease;
  }
  .corner-cat.show { opacity: 0.88; }
  .corner-cat img {
    width: clamp(55px, 9vw, 90px);
    animation: floatCorner 4s ease-in-out infinite;
  }
  #cat-tl { top: 16px; left: 16px; }
  #cat-tr { top: 16px; right: 16px; }
  #cat-bl { bottom: 16px; left: 16px; }
  #cat-br { bottom: 16px; right: 16px; }
  #cat-tl img { animation-delay: 0s; }
  #cat-tr img { animation-delay: 1s; }
  #cat-bl img { animation-delay: 0.5s; }
  #cat-br img { animation-delay: 1.5s; }
  @keyframes floatCorner {
    0%,100% { transform: translateY(0) scale(1); }
    50%     { transform: translateY(-8px) scale(1.04); }
  }

  #trans-overlay {
    position: fixed; inset: 0; z-index: 8888;
    background: #fff;
    opacity: 0; pointer-events: none;
    transition: opacity 0.18s ease;
  }

  @media (max-width: 480px) {
    .bday-line  { font-size: 14px; }
    .bday-title { font-size: 34px; }
  }

  .popup-cat {
    position: fixed;
    width: 140px; height: auto;
    z-index: 9998; pointer-events: none;
    opacity: 0;
    animation: floatUp 5s linear forwards;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(40px) scale(0.8); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-120vh) scale(1.1); }
  }

</style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div id="grain"></div>
<div id="trans-overlay"></div>

<div class="corner-cat" id="cat-tl"><img src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt=""></div>
<div class="corner-cat" id="cat-tr"><img src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt=""></div>
<div class="corner-cat" id="cat-bl"><img src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt=""></div>
<div class="corner-cat" id="cat-br"><img src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt=""></div>

<!-- ═══ SCREEN 1: COUNTDOWN ═══ -->
<div class="screen active" id="screen-countdown">
  <p class="countdown-label">SYSTEM_LOG :: EVENT_TRACKING</p>
  <p class="countdown-sentence">
    The day will arrive in&nbsp;<span id="glitch-number">000</span>&nbsp;days
  </p>
  <p class="countdown-sub">[ VISIT AGAIN LATER ]</p>
</div>

<!-- ═══ SCREEN 2: ARRIVAL ═══ -->
<div class="screen" id="screen-arrival">
  <p class="arrival-text" id="arrival-text">The day has finally arrived.</p>
  <button class="reveal-btn" id="reveal-btn">Click to see what's special</button>
</div>

<!-- ═══ SCREEN 3: BIRTHDAY ═══ -->
<div class="screen" id="screen-birthday">
  <div class="birthday-inner">
    <h1 class="bday-title"  id="bday-title">Yippie! Happy 20th Birthday Fai</h1>
    <p  class="bday-date"   id="bday-date">21 April 2006 — 21 April 2026</p>

    <div class="gif-row-top" id="gif-top">
      <img class="scuba-gif" src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt="scuba cat">
      <img class="scuba-gif" src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt="scuba cat">
      <img class="scuba-gif" src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt="scuba cat">
    </div>

    <div class="bday-lines" id="bday-lines"></div>

    <div class="gif-row-bottom" id="gif-bottom">
      <img class="scuba-gif" src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt="scuba cat">
      <img class="scuba-gif" src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt="scuba cat">
      <img class="scuba-gif" src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt="scuba cat">
      <img class="scuba-gif" src="https://media.tenor.com/9bDFGkBJyKEAAAAi/scuba-cat.gif" alt="scuba cat">
    </div>
  </div>
</div>

<audio id="bday-audio" preload="auto">
  <source src="scuba.mp3" type="audio/mpeg">
</audio>

<script>
// ═══════════════════════════════════════════════
//  CUSTOM CURSOR + TRAIL
// ═══════════════════════════════════════════════
const cursorDot  = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');

let mouseX = window.innerWidth  / 2;
let mouseY = window.innerHeight / 2;
let ringX  = mouseX;
let ringY  = mouseY;
let cursorVisible  = false;
let lastTrailTime  = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  // FIX: reveal cursor on first real mousemove, not before
  if (!cursorVisible) {
    cursorVisible = true;
    cursorDot.style.opacity  = '1';
    cursorRing.style.opacity = '1';
  }

  cursorDot.style.left = mouseX + 'px';
  cursorDot.style.top  = mouseY + 'px';

  // Trail — throttled to ~40ms
  const now = Date.now();
  if (now - lastTrailTime > 40) {
    lastTrailTime = now;
    const t  = document.createElement('div');
    t.className = 'cursor-trail';
    const sz = 2 + Math.random() * 4;
    t.style.width  = sz + 'px';
    t.style.height = sz + 'px';
    t.style.left = (mouseX + (Math.random() - 0.5) * 8) + 'px';
    t.style.top  = (mouseY + (Math.random() - 0.5) * 8) + 'px';
    document.body.appendChild(t);
    setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 650);
  }
});

// Smooth-follow ring via rAF lerp
(function animateRing() {
  ringX += (mouseX - ringX) * 0.13;
  ringY += (mouseY - ringY) * 0.13;
  cursorRing.style.left = ringX + 'px';
  cursorRing.style.top  = ringY + 'px';
  requestAnimationFrame(animateRing);
})();

// Expand ring on interactive elements
document.addEventListener('mouseover', (e) => {
  if (e.target.matches('button, a, [role="button"]')) {
    cursorRing.style.width       = '44px';
    cursorRing.style.height      = '44px';
    cursorRing.style.borderColor = 'rgba(255,255,255,0.9)';
  }
});
document.addEventListener('mouseout', (e) => {
  if (e.target.matches('button, a, [role="button"]')) {
    cursorRing.style.width       = '28px';
    cursorRing.style.height      = '28px';
    cursorRing.style.borderColor = 'rgba(255,255,255,0.55)';
  }
});

document.addEventListener('mouseleave', () => {
  cursorDot.style.opacity  = '0';
  cursorRing.style.opacity = '0';
});
document.addEventListener('mouseenter', () => {
  if (cursorVisible) {
    cursorDot.style.opacity  = '1';
    cursorRing.style.opacity = '1';
  }
});

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let glitchInterval = null;
let arrived        = false;
let catLoop        = null;

const BIRTHDAY = new Date('2026-04-21T00:00:00');

// ═══════════════════════════════════════════════
//  GLITCH NUMBER
// ═══════════════════════════════════════════════
function startGlitch() {
  const el = document.getElementById('glitch-number');
  glitchInterval = setInterval(() => {
    const real = Math.max(0, Math.ceil((BIRTHDAY - Date.now()) / 86400000));
    const n    = Math.floor(Math.random() * 9999) + 1;
    el.textContent = String(Math.random() < 0.04 ? real : n).padStart(3, '0');
  }, 60);
}
function stopGlitch() {
  clearInterval(glitchInterval);
  glitchInterval = null;
}

// ═══════════════════════════════════════════════
//  ARRIVAL CHECK
// ═══════════════════════════════════════════════
const FORCE_ARRIVED = false;

function checkArrival() {
  const now = new Date();
  return FORCE_ARRIVED ||
    (now >= BIRTHDAY && now < new Date(BIRTHDAY.getTime() + 86400000 * 2));
}

// ═══════════════════════════════════════════════
//  COUNTDOWN → ARRIVAL
// ═══════════════════════════════════════════════
function triggerArrival() {
  if (arrived) return;
  arrived = true;
  stopGlitch();

  const overlay = document.getElementById('trans-overlay');
  let flashes = 0;
  const fi = setInterval(() => {
    overlay.style.opacity = flashes % 2 === 0 ? '0.15' : '0';
    flashes++;
    if (flashes >= 8) {
      clearInterval(fi);
      overlay.style.opacity = '0';
      doScreenSwitch('countdown', 'arrival');
    }
  }, 70);
}

// ═══════════════════════════════════════════════
//  SCREEN SWITCH
//
//  For screens 1→2: standard — remove .active from old, add .active to new.
//  For screen 3 (birthday): two-frame sequence to fix position/opacity conflict:
//    Frame A: add .active  → position:fixed → relative reflow, opacity still 0
//    Frame B: add .fadein  → opacity:0 → 1 transition fires cleanly
// ═══════════════════════════════════════════════
function doScreenSwitch(fromId, toId) {
  const from = document.getElementById('screen-' + fromId);
  const to   = document.getElementById('screen-' + toId);

  from.classList.remove('active');

  setTimeout(() => {
    if (toId === 'birthday') {
      // Unlock scroll before the layout switch
      document.body.classList.add('birthday-active');

      // Step 1: add .active — switches position, opacity stays 0
      to.classList.add('active');

      // Step 2: next rAF — now add .fadein to trigger opacity transition
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          to.classList.add('fadein');
        });
      });

    } else {
      to.classList.add('active');
    }

    if (toId === 'arrival')  animateArrival();
    if (toId === 'birthday') animateBirthday();
  }, 500);
}

// ═══════════════════════════════════════════════
//  ARRIVAL ANIMATION
// ═══════════════════════════════════════════════
function animateArrival() {
  setTimeout(() => {
    document.getElementById('arrival-text').classList.add('visible');
    document.getElementById('reveal-btn').classList.add('visible');
  }, 200);
}

// ═══════════════════════════════════════════════
//  GO TO BIRTHDAY
// ═══════════════════════════════════════════════
function goToBirthday() {
  const btn = document.getElementById('reveal-btn');
  btn.disabled = true;
  btn.style.pointerEvents = 'none';

  startCatLoop();

  const audio = document.getElementById('bday-audio');
  audio.loop = true;
  audio.currentTime = 0;
  audio.volume = 0.65;
  audio.play().catch(err => console.warn('Audio autoplay blocked:', err));

  const overlay = document.getElementById('trans-overlay');
  let f = 0;
  const fi = setInterval(() => {
    overlay.style.opacity = f % 2 === 0 ? '0.22' : '0';
    f++;
    if (f >= 6) {
      clearInterval(fi);
      overlay.style.opacity = '0';
      doScreenSwitch('arrival', 'birthday');
    }
  }, 80);
}

// ═══════════════════════════════════════════════
//  CAT SPAWNING
// ═══════════════════════════════════════════════
function spawnCats() {
  const img = document.createElement('img');
  img.src = 'https://media1.tenor.com/m/Xn3TfHpAJiMAAAAd/scuba-cat-scuba.gif';
  img.className = 'popup-cat';
  img.style.width = (240 + Math.random() * 140) + 'px';
  const side = Math.random() < 0.5 ? 'left' : 'right';
  img.style.top  = (10 + Math.random() * 80) + 'vh';
  img.style[side] = (-20 + Math.random() * 60) + 'px';
  document.body.appendChild(img);
  setTimeout(() => { if (img.parentNode) img.parentNode.removeChild(img); }, 5100);
}
function startCatLoop() {
  if (catLoop) return;
  catLoop = setInterval(spawnCats, 1800);
}

// ═══════════════════════════════════════════════
//  BIRTHDAY LINES
// ═══════════════════════════════════════════════
const lines = [
  { text: "okay so you're <strong>20</strong>. you're an unc now 🤗", cls: 'big' },
  { text: "a few months ago we didn't even know each other.", cls: 'muted' },
  { text: "and even now, we still don't know that much about each other.", cls: '' },
  { text: "but it's been really fun talking to you. like actually fun.", cls: '' },
  { text: "i also feel safe talking to you, which is random but yeah.", cls: 'spacer' },
  { text: "anyways, happy birthday Fai.", cls: 'big' },
  { text: "hope today is good, and the days ahead are good too.", cls: '' },
  { text: "since the last few weeks, i was thinking about how to wish you on your birthday.", cls: '' },
  { text: "a lot of stuff came to mind, but i forgot most of it, uh…", cls: '' },
  { text: "or maybe i just didn't wanna say them — might've felt awkward, cringe, stupid lol.", cls: 'muted' },
  { text: "whatever.", cls: '' },
  { text: "btw did you like the scuba thingy? 😛", cls: 'big' },
];

let linesBuilt = false;
function buildLines() {
  if (linesBuilt) return;
  linesBuilt = true;
  const container = document.getElementById('bday-lines');
  lines.forEach((l) => {
    const div = document.createElement('div');
    div.className = 'bday-line' + (l.cls ? ' ' + l.cls : '');
    div.innerHTML = l.text;
    container.appendChild(div);
  });
}

function animateBirthday() {
  buildLines();
  setTimeout(() => document.getElementById('bday-title').classList.add('show'), 300);
  setTimeout(() => document.getElementById('bday-date').classList.add('show'),  700);
  setTimeout(() => document.getElementById('gif-top').classList.add('show'),   1100);

  document.querySelectorAll('.bday-line').forEach((el, i) => {
    setTimeout(() => el.classList.add('show'), 1500 + i * 380);
  });

  const totalDelay = 1500 + lines.length * 380 + 400;
  setTimeout(() => {
    document.getElementById('gif-bottom').classList.add('show');
    document.querySelectorAll('.corner-cat').forEach(c => c.classList.add('show'));
  }, totalDelay);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('reveal-btn').addEventListener('click', goToBirthday);
  startGlitch();
  if (checkArrival()) setTimeout(triggerArrival, 3500);
});
</script>
